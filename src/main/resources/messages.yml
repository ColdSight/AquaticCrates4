"keys-offline-requires-virtual":
  "lines":
  - "components":
    - "text": "<#EC5656>Offline giveall requires <#E5DBD1>-v</#E5DBD1> because physical keys cannot be given offline."
"key-bank":
  "lines":
  - "components":
    - "text": "<gray>➥ <#3EC4DE>%crate_name%</#3EC4DE> (<#E5DBD1>%crate_id%</#E5DBD1>) <dark_gray>|</dark_gray> <#90EF87>%amount% Keys</#90EF87> "
  "pagination":
