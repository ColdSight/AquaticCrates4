        "value": "https://docs.aquatic.gg/aquaticcrates/acrates-introduction"
  - "components":
    - "text": "<#18788C>⬛⬛<#3EC4DE>⬛⬛⬛<#18788C>⬛⬛"
  - "components":
    - "text": "<#18788C>⬛⬛      ⬛⬛            "
    - "text": "<#68A6E8>[ʙᴜɪʟᴛʙʏʙɪᴛ]"
      "hover":
      - "<gray>Open the BuiltByBit profile."
      "click":
        "type": "OPEN_URL"
        "value": "https://builtbybit.com/members/larkyy.122935"
    - "text": " "
    - "text": "<#B082F5>[ᴘᴀᴛʀᴇᴏɴ]"
      "hover":
      - "<gray>Open the Patreon page."
      "click":
        "type": "OPEN_URL"
        "value": "https://www.patreon.com/c/aquaticgg"
  - "components":
    - "text": " "
  - "components":
    - "text": " "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates crate menu"
      "hover":
      - "<#E5DBD1>Open the in-game crate management menu."
      - ""
      - "<gray>Click to run this command."
      "click":
        "type": "RUN_COMMAND"
        "value": "/aqcrates crate menu"
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates crate edit <#E5DBD1><crate-id>"
      "hover":
      - "<#E5DBD1>Edit an existing crate."
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates crate edit "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates crate give <#E5DBD1><crate-id>"
      "hover":
      - "<#E5DBD1>Give yourself a crate item."
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates crate give "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates crate open <#E5DBD1><crate-id> [player] [amount] -nokey]"
      "hover":
      - "<#E5DBD1>Open a crate for a player."
      - ""
      - "<gray>Arguments:"
      - "<gray><crate-id> <dark_gray>| <#E5DBD1>Target crate id"
      - "<gray>[player] <dark_gray>| <#E5DBD1>Target player, defaults to self"
      - "<gray>[amount] <dark_gray>| <#E5DBD1>Open amount, defaults to 1"
      - ""
      - "<gray>Flags:"
      - "<gray>-nokey <dark_gray>| <#E5DBD1>Bypass held key requirement"
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates crate open "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates key give <#E5DBD1><crate-id> [player] [amount] [-v] [-s]"
      "hover":
      - "<white>Give crate keys."
      - ""
      - "<gray>Arguments:"
      - "<gray><crate-id> <dark_gray>| <#E5DBD1>Target crate id"
      - "<gray>[player] <dark_gray>| <#E5DBD1>Target player, defaults to self"
      - "<gray>[amount] <dark_gray>| <#E5DBD1>Key amount, defaults to 1"
      - ""
      - "<gray>Flags:"
      - "<gray>-v <dark_gray>| <#E5DBD1>Virtual keys"
      - "<gray>-s <dark_gray>| <#E5DBD1>Silent"
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates key give "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates key giveall <#E5DBD1><crate-id> [amount] [-v] [-s] [-off]"
      "hover":
      - "<white>Give crate keys to all players."
      - ""
      - "<gray>Arguments:"
      - "<gray><crate-id> <dark_gray>| <#E5DBD1>Target crate id"
      - "<gray>[amount] <dark_gray>| <#E5DBD1>Key amount, defaults to 1"
      - ""
      - "<gray>Flags:"
      - "<gray>-off <dark_gray>| <#E5DBD1>Give to offline players (requires -v)"
      - "<gray>-v <dark_gray>| <#E5DBD1>Virtual keys"
      - "<gray>-s <dark_gray>| <#E5DBD1>Silent"
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates key giveall "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates key bank <#E5DBD1>[player]"
      "hover":
      - "<white>Show virtual key balances."
      - ""
      - "<gray>Arguments:"
      - "<gray>[player] <dark_gray>| <#E5DBD1>Target player, defaults to self"
      - ""
      - "<gray>Permission:"
      - "<gray>aqcrates.admin.keybank.others <dark_gray>| <#E5DBD1>View other players"
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates key bank "
  - "components":
    - "text": " "
  - "components":
    - "text": " "
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates messages"
      "hover":
      - "<#E5DBD1>Open the in-game messages editor."
      - ""
      - "<gray>Click to run this command."
      "click":
        "type": "RUN_COMMAND"
        "value": "/aqcrates messages"
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates reload"
      "hover":
      - "<#E5DBD1>Reload crates, messages and runtime registries."
      - ""
      - "<gray>Click to run this command."
      "click":
        "type": "RUN_COMMAND"
        "value": "/aqcrates reload"
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates stats invalidate"
      "hover":
      - "<#E5DBD1>Delete obsolete stats rows for removed crates."
      - "<#E5DBD1>Also removes hourly buckets older than 31 days."
      - ""
      - "<gray>Click to run this command."
      "click":
        "type": "RUN_COMMAND"
        "value": "/aqcrates stats invalidate"
  - "components":
    - "text": "<gray>➥ "
    - "text": "<#3EC4DE>/aqcrates makevisible <#E5DBD1>[player]"
      "hover":
      - "<#E5DBD1>Make a player visible again if"
      - "<#E5DBD1>an animation glitch made them invisible."
      - ""
      - "<gray>Click to suggest this command."
      "click":
        "type": "SUGGEST_COMMAND"
        "value": "/aqcrates makevisible "
  - "components":
    - "text": " "
  "pagination":
    "page-size": 9
    "footer":
      "components":
      - "text": "<#3EC4DE>[← Previous Page]"
        "hover":
        - "<gray>Open the previous help page."
        "click":
          "type": "PAGE"
          "value": "prev"
        "visibility-conditions":
        - "type": "has-previous-page"
      - "text": " <gray>| "
        "visibility-conditions":
        - "type": "has-previous-page"
        - "type": "has-next-page"
      - "text": "<#3EC4DE>[Next Page →]"
        "hover":
        - "<gray>Open the next help page."
        "click":
          "type": "PAGE"
          "value": "next"
        "visibility-conditions":
        - "type": "has-next-page"
      "visibility-conditions":
      - "type": "has-next-or-previous-page"
