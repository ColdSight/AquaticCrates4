          "negate": false
      - "text": " <gray>| "
        "visibility-conditions":
        - "type": "has-previous-page"
          "negate": false
        - "type": "has-next-page"
          "negate": false
      - "text": "<#6E7EF0>[Next Page →]"
        "hover":
        - "<gray>Open the next page."
        "click":
          "type": "PAGE"
          "value": "next"
        "visibility-conditions":
        - "type": "has-next-page"
          "negate": false
      "visibility-conditions":
      - "type": "has-next-or-previous-page"
        "negate": false
