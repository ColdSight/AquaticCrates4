  "lines":
  - "components":
    - "text": "<#90EF87>You have been given <#E5DBD1>%amount%x</#E5DBD1> <#3EC4DE>%crate_id%</#3EC4DE> <#E5DBD1>%key_type%</#E5DBD1> key."
